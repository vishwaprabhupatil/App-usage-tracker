name: parental_monitor
description: "A parental monitoring Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  android_intent_plus: ^5.0.2
  device_apps: ^2.2.0
  
  logger: ^2.0.2  

  provider: ^6.1.2
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.0
  usage_stats: ^1.3.1
  installed_apps: ^2.1.0
  flutter_foreground_task: ^8.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/app_icon.png
    - assets/icons/google_logo.png

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
